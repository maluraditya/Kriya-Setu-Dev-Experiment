<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#FCFCF8"/>

  <!-- Title -->
  <text x="512" y="106" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700">ANIMAL TISSUES</text>
  <text x="512" y="154" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="28">Epithelial (Simple vs Compound) · Connective (Cartilage vs Bone)</text>

  <!-- Outer card -->
  <rect x="40" y="192" width="944" height="790" rx="28" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="4"/>

  <!-- ══════════ LEFT PANEL — Epithelial Tissue ══════════ -->
  <rect x="66" y="218" width="460" height="738" rx="22" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="3"/>

  <text x="296" y="268" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">EPITHELIAL TISSUE</text>
  <text x="296" y="300" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="22">Barrier and lining tissue</text>

  <!-- ── Simple Epithelium ── -->
  <rect x="88" y="322" width="416" height="192" rx="16" fill="#F0F9FF" stroke="#7DD3FC" stroke-width="2"/>
  <text x="296" y="352" text-anchor="middle" fill="#0369A1" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Simple Epithelium</text>
  <text x="296" y="376" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="18">Single layer — designed for diffusion</text>

  <!-- Single row of flat squamous cells -->
  <!-- Basement membrane -->
  <rect x="108" y="480" width="376" height="10" rx="4" fill="#94A3B8"/>
  <text x="296" y="506" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Basement Membrane</text>

  <!-- 8 flat cells -->
  <rect x="108" y="440" width="44" height="38" rx="5" fill="#BAE6FD" stroke="#0369A1" stroke-width="2"/>
  <rect x="156" y="440" width="44" height="38" rx="5" fill="#BAE6FD" stroke="#0369A1" stroke-width="2"/>
  <rect x="204" y="440" width="44" height="38" rx="5" fill="#BAE6FD" stroke="#0369A1" stroke-width="2"/>
  <rect x="252" y="440" width="44" height="38" rx="5" fill="#BAE6FD" stroke="#0369A1" stroke-width="2"/>
  <rect x="300" y="440" width="44" height="38" rx="5" fill="#BAE6FD" stroke="#0369A1" stroke-width="2"/>
  <rect x="348" y="440" width="44" height="38" rx="5" fill="#BAE6FD" stroke="#0369A1" stroke-width="2"/>
  <rect x="396" y="440" width="44" height="38" rx="5" fill="#BAE6FD" stroke="#0369A1" stroke-width="2"/>
  <rect x="444" y="440" width="40" height="38" rx="5" fill="#BAE6FD" stroke="#0369A1" stroke-width="2"/>
  <!-- Nuclei -->
  <ellipse cx="130" cy="459" rx="8" ry="7" fill="#0369A1" opacity="0.5"/>
  <ellipse cx="178" cy="459" rx="8" ry="7" fill="#0369A1" opacity="0.5"/>
  <ellipse cx="226" cy="459" rx="8" ry="7" fill="#0369A1" opacity="0.5"/>
  <ellipse cx="274" cy="459" rx="8" ry="7" fill="#0369A1" opacity="0.5"/>
  <ellipse cx="322" cy="459" rx="8" ry="7" fill="#0369A1" opacity="0.5"/>
  <ellipse cx="370" cy="459" rx="8" ry="7" fill="#0369A1" opacity="0.5"/>
  <ellipse cx="418" cy="459" rx="8" ry="7" fill="#0369A1" opacity="0.5"/>
  <!-- 1 layer label -->
  <text x="296" y="430" text-anchor="middle" fill="#0369A1" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">1 cell layer</text>

  <!-- ── Compound Epithelium ── -->
  <rect x="88" y="532" width="416" height="210" rx="16" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="296" y="562" text-anchor="middle" fill="#5B21B6" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Compound Epithelium</text>
  <text x="296" y="586" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="18">Multiple layers — protection armour</text>

  <!-- 5 stratified layers -->
  <rect x="108" y="600" width="376" height="22" rx="3" fill="#DDD6FE" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="108" y="624" width="376" height="22" rx="3" fill="#C4B5FD" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="108" y="648" width="376" height="22" rx="3" fill="#A78BFA" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="108" y="672" width="376" height="22" rx="3" fill="#7C3AED" stroke="#5B21B6" stroke-width="1.5"/>
  <rect x="108" y="696" width="376" height="10" rx="3" fill="#94A3B8"/>
  <!-- Layer labels -->
  <text x="500" y="614" fill="#5B21B6" font-family="Arial, Helvetica, sans-serif" font-size="14">Top (wears first)</text>
  <text x="500" y="684" fill="#5B21B6" font-family="Arial, Helvetica, sans-serif" font-size="14">Deep (protected)</text>
  <line x1="488" y1="611" x2="484" y2="611" stroke="#5B21B6" stroke-width="1.5"/>
  <text x="296" y="720" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Basement Membrane</text>

  <!-- Simple vs Compound summary pills -->
  <rect x="98" y="752" width="190" height="52" rx="26" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="2"/>
  <text x="193" y="773" text-anchor="middle" fill="#0369A1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Simple</text>
  <text x="193" y="793" text-anchor="middle" fill="#0369A1" font-family="Arial, Helvetica, sans-serif" font-size="14">Filter · Diffusion</text>

  <rect x="306" y="752" width="190" height="52" rx="26" fill="#EDE9FE" stroke="#A78BFA" stroke-width="2"/>
  <text x="401" y="773" text-anchor="middle" fill="#5B21B6" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Compound</text>
  <text x="401" y="793" text-anchor="middle" fill="#5B21B6" font-family="Arial, Helvetica, sans-serif" font-size="14">Armour · Protection</text>

  <!-- Location labels -->
  <text x="193" y="832" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Lungs, blood vessels</text>
  <text x="401" y="832" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Skin, buccal cavity</text>

  <text x="296" y="870" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Cells compactly packed · Basement membrane</text>
  <text x="296" y="894" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Little intercellular matrix</text>

  <!-- ══════════ RIGHT PANEL — Connective Tissue ══════════ -->
  <rect x="546" y="218" width="460" height="738" rx="22" fill="#FFF7ED" stroke="#FED7AA" stroke-width="3"/>

  <text x="776" y="268" text-anchor="middle" fill="#C2410C" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">CONNECTIVE TISSUE</text>
  <text x="776" y="300" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="22">Specialised: Cartilage and Bone</text>

  <!-- ── Cartilage ── -->
  <rect x="566" y="322" width="420" height="192" rx="16" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="776" y="352" text-anchor="middle" fill="#065F46" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Cartilage</text>
  <text x="776" y="376" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="18">Pliable · Chondroitin matrix · Shock absorber</text>

  <!-- Gel matrix -->
  <ellipse cx="776" cy="458" rx="150" ry="62" fill="#A7F3D0" stroke="#059669" stroke-width="2.5"/>
  <!-- Chondroitin wavy chains -->
  <path d="M640 450 C652 440 664 460 676 450 C688 440 700 460 712 450 C724 440 736 460 748 450" stroke="#059669" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M800 468 C812 458 824 478 836 468 C848 458 860 478 872 468 C884 458 896 478 908 468" stroke="#059669" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Chondrocytes in lacunae -->
  <ellipse cx="700" cy="450" rx="18" ry="14" fill="#6EE7B7" stroke="#059669" stroke-width="2"/>
  <ellipse cx="700" cy="450" rx="6" ry="5" fill="#059669" opacity="0.6"/>
  <ellipse cx="756" cy="472" rx="18" ry="14" fill="#6EE7B7" stroke="#059669" stroke-width="2"/>
  <ellipse cx="756" cy="472" rx="6" ry="5" fill="#059669" opacity="0.6"/>
  <ellipse cx="820" cy="448" rx="18" ry="14" fill="#6EE7B7" stroke="#059669" stroke-width="2"/>
  <ellipse cx="820" cy="448" rx="6" ry="5" fill="#059669" opacity="0.6"/>
  <text x="776" y="510" text-anchor="middle" fill="#065F46" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Chondrocytes in lacunae</text>
  <text x="776" y="496" text-anchor="middle" fill="#065F46" font-family="Arial, Helvetica, sans-serif" font-size="14">Compresses under load — springs back</text>

  <!-- ── Bone ── -->
  <rect x="566" y="532" width="420" height="210" rx="16" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
  <text x="776" y="562" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Bone</text>
  <text x="776" y="586" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="18">Rigid · Calcium matrix · Load bearer</text>

  <!-- Haversian system circles -->
  <circle cx="680" cy="648" r="58" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="680" cy="648" r="40" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="680" cy="648" r="22" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="680" cy="648" r="8" fill="#64748B"/>
  <!-- Calcium deposits -->
  <circle cx="680" cy="626" r="5" fill="#FCD34D"/>
  <circle cx="702" cy="633" r="5" fill="#FCD34D"/>
  <circle cx="706" cy="657" r="5" fill="#FCD34D"/>
  <circle cx="694" cy="675" r="5" fill="#FCD34D"/>
  <circle cx="668" cy="678" r="5" fill="#FCD34D"/>
  <circle cx="654" cy="660" r="5" fill="#FCD34D"/>
  <circle cx="658" cy="636" r="5" fill="#FCD34D"/>

  <circle cx="836" cy="648" r="44" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="836" cy="648" r="28" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="836" cy="648" r="10" fill="#64748B"/>
  <circle cx="836" cy="620" r="4" fill="#FCD34D"/>
  <circle cx="860" cy="636" r="4" fill="#FCD34D"/>
  <circle cx="858" cy="664" r="4" fill="#FCD34D"/>
  <circle cx="836" cy="676" r="4" fill="#FCD34D"/>
  <circle cx="812" cy="662" r="4" fill="#FCD34D"/>
  <circle cx="812" cy="636" r="4" fill="#FCD34D"/>

  <text x="776" y="716" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Haversian canals · Osteocytes</text>
  <text x="776" y="734" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="14">0% compression — rigid under load</text>

  <!-- Cartilage vs Bone summary pills -->
  <rect x="576" y="754" width="192" height="52" rx="26" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="672" y="775" text-anchor="middle" fill="#065F46" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Cartilage</text>
  <text x="672" y="795" text-anchor="middle" fill="#065F46" font-family="Arial, Helvetica, sans-serif" font-size="14">Chondroitin · Spring</text>

  <rect x="784" y="754" width="192" height="52" rx="26" fill="#E2E8F0" stroke="#94A3B8" stroke-width="2"/>
  <text x="880" y="775" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Bone</text>
  <text x="880" y="795" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="14">Calcium · Girder</text>

  <!-- Location labels -->
  <text x="672" y="832" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Nose, ear, vertebrae</text>
  <text x="880" y="832" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Skull, ribs, femur</text>

  <text x="776" y="870" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Both are Specialised Connective Tissues</text>
  <text x="776" y="894" text-anchor="middle" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Cells in lacunae · Abundant intercellular matrix</text>

  <!-- Bottom key rule -->
  <text x="512" y="1002" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Simple = Filter · Compound = Armour · Cartilage = Spring · Bone = Girder</text>

</svg>
